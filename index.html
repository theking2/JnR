<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Runner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hud">
        <div>
          <p class="eyebrow">Sprung & Lauf</p>
          <h1>Neon Runner</h1>
        </div>
        <div class="hud-stats">
          <div class="stat-card">
            <span class="label">Level</span>
            <strong id="levelDisplay">1</strong>
          </div>
          <div class="stat-card">
            <span class="label">Punktzahl</span>
            <strong id="scoreDisplay">0</strong>
          </div>
        </div>
      </header>

      <canvas id="gameCanvas"></canvas>

      <div id="overlay" class="overlay active">
        <div class="panel">
          <h2>Starte deinen Lauf</h2>
          <p>Nutze die Pfeiltasten oder A/D, um dich zu bewegen und durch drei neonfarbene Levels zu springen.</p>

          <form id="playerForm">
            <label>
              Vorname
              <input id="firstName" name="firstName" required />
            </label>
            <label>
              Nachname
              <input id="lastName" name="lastName" required />
            </label>
            <label>
              E-Mail
              <input id="email" name="email" type="email" required />
            </label>
            <button type="submit">Rennen starten</button>
          </form>

          <div class="actions">
            <button id="fullscreenButton" class="secondary">Vollbild</button>
          </div>

          <div class="leaderboard-card">
            <h3>Bestenliste</h3>
            <ol id="leaderboardList"></ol>
            <p style="margin-top: 0.6rem;"><a class="nav-link" href="leaderboard.html">Zur vollständigen Bestenliste</a></p>
          </div>
        </div>
      </div>

      <div id="statusMessage" class="status-message" aria-live="polite"></div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
